<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" role="img" aria-label="The pi-context-tree context panel: a session tree with per-node token costs, branch status colors, a health gauge, and key hints.">
  <defs>
    <linearGradient id="health2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ea043"/>
      <stop offset="0.55" stop-color="#3fb950"/>
      <stop offset="0.8" stop-color="#d29922"/>
      <stop offset="1" stop-color="#f85149"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; }
    .dim { fill: #8b949e; } .fg { fill: #e6edf3; } .user { fill: #e6edf3; }
    .asst { fill: #adbac7; } .tool { fill: #adbac7; }
    .dec { fill: #58a6ff; } .open { fill: #3fb950; } .rej { fill: #f85149; } .sq { fill: #58a6ff; }
    .crop { fill: #f0883e; } .warn { fill: #d29922; } .here { fill: #39c5cf; } .ok { fill: #3fb950; }
  </style>

  <rect width="900" height="440" rx="12" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="899" height="439" rx="12" fill="none" stroke="#30363d"/>

  <!-- header -->
  <rect x="1" y="1" width="898" height="40" rx="12" fill="#161b22"/>
  <text x="20" y="26" class="fg" font-weight="700">pi-context-tree</text>
  <text x="190" y="26" class="dim">⎇ <tspan class="open">fix-flaky-test</tspan>  ·  ctx <tspan class="ok">12% healthy</tspan>  ·  opus-4.8</text>
  <line x1="1" y1="41" x2="899" y2="41" stroke="#30363d"/>

  <!-- tree -->
  <g transform="translate(20,70)">
    <text x="0" y="0"><tspan class="user">●</tspan> <tspan class="user">user: the parser test is flaky</tspan></text>
    <text x="0" y="26"><tspan class="asst">○</tspan> <tspan class="asst">assistant: let me reproduce and read the parser…</tspan></text>
    <text x="0" y="52"><tspan class="tool">⚙</tspan> <tspan class="tool">read_file src/parser.ts</tspan>   <tspan class="dim">~2.1k</tspan></text>
    <text x="0" y="78"><tspan class="dec">◆</tspan> <tspan class="dec">decision: extract a streaming reader</tspan>   <tspan class="ok">✓ human-confirmed</tspan></text>

    <text x="0" y="108"><tspan class="open">⎇</tspan> <tspan class="open">fix-flaky-test</tspan>  <tspan class="dim">(open)</tspan>                          <tspan class="here">← you are here</tspan></text>
    <text x="24" y="134"><tspan class="user">●</tspan> <tspan class="user">user: try a buffered approach on haiku</tspan></text>
    <text x="24" y="160"><tspan class="asst">○</tspan> <tspan class="asst">assistant: switching strategy…</tspan></text>
    <text x="24" y="186"><tspan class="tool">⚙</tspan> <tspan class="tool">run_tests</tspan>   <tspan class="warn">~38k ⚠</tspan></text>
    <text x="24" y="212"><tspan class="asst">○</tspan> <tspan class="asst">assistant: green — root cause was the chunk boundary</tspan>   <tspan class="here">◀ leaf</tspan></text>

    <text x="0" y="242"><tspan class="rej">⎇</tspan> <tspan class="rej">storage-b</tspan>  <tspan class="dim">(rejected — breaks on MV3 suspension)</tspan></text>
    <text x="0" y="268"><tspan class="sq">⎇</tspan> <tspan class="sq">storage-c</tspan>  <tspan class="dim">(squashed)</tspan></text>
    <text x="0" y="294"><tspan class="crop">✂</tspan> <tspan class="crop">cropped: web_fetch ×2, ~41k, a1b2c3d4</tspan></text>
  </g>

  <!-- gauge -->
  <g transform="translate(20,388)">
    <text x="0" y="0" class="dim" font-size="12">CONTEXT</text>
    <rect x="80" y="-12" width="340" height="14" rx="7" fill="#21262d"/>
    <rect x="80" y="-12" width="92" height="14" rx="7" fill="url(#health2)"/>
    <line x1="97" y1="-15" x2="97" y2="5" stroke="#0d1117"/>
    <line x1="131" y1="-15" x2="131" y2="5" stroke="#0d1117"/>
    <line x1="216" y1="-15" x2="216" y2="5" stroke="#0d1117"/>
    <text x="432" y="0" class="ok" font-size="12">12% · healthy (5–15% band)</text>
  </g>

  <line x1="1" y1="408" x2="899" y2="408" stroke="#30363d"/>
  <text x="20" y="428" class="dim" font-size="12">⏎ jump · b branch · m merge · c crop · i inspect · D decisions · u consumers · q close</text>
</svg>
